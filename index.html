<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediCore AI Clinic</title>
  <style>
    :root {
      --bg: #f7f4ec;
      --surface: #ffffff;
      --text: #17212a;
      --muted: #4c5a67;
      --accent: #0f766e;
      --accent-dark: #134e4a;
      --border: #c9d0d6;
      --danger: #b91c1c;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.14);
      --focus: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    a { color: inherit; }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, a:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }
    .skip-link {
      position: absolute; left: -9999px; top: 0; background: #111827; color: white; padding: 0.75rem 1rem; z-index: 1000;
    }
    .skip-link:focus { left: 1rem; top: 1rem; }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
    .app { min-height: 100vh; display: flex; flex-direction: column; }
    .shell { display: flex; flex: 1; min-height: 0; }
    .sidebar { width: 280px; background: var(--accent-dark); color: #f8fafc; padding: 1.2rem 1rem; display: flex; flex-direction: column; gap: 1rem; }
    .brand { display: flex; align-items: center; gap: 0.8rem; padding-bottom: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.2); }
    .brand-badge { width: 48px; height: 48px; border-radius: 14px; display: grid; place-items: center; background: var(--accent); font-size: 1.3rem; font-weight: 700; }
    .brand h1 { margin: 0; font-size: 1.05rem; }
    .brand p { margin: 0.2rem 0 0; color: #b7f0e4; font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase; }
    .nav { display: flex; flex-direction: column; gap: 0.45rem; }
    .nav button { min-height: 46px; text-align: left; border: 0; border-radius: 12px; padding: 0.8rem 0.9rem; background: transparent; color: #dce7ea; font-weight: 600; font-size: 0.97rem; }
    .nav button.active { background: var(--accent); color: white; }
    .sidebar-note { margin-top: auto; padding: 0.9rem; border-radius: 14px; background: rgba(255,255,255,0.12); font-size: 0.92rem; color: #e6f5f1; }
    .main { flex: 1; padding: 1.1rem; display: flex; flex-direction: column; gap: 1rem; }
    .topbar { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; box-shadow: var(--shadow); padding: 1rem 1.1rem; display: flex; justify-content: space-between; align-items: center; gap: 0.8rem; flex-wrap: wrap; }
    .topbar h2 { margin: 0; font-size: 1.25rem; }
    .topbar p { margin: 0.2rem 0 0; color: #4c5a67; font-size: 0.95rem; }
    .topbar-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; }
    .btn { min-height: 46px; border: 1px solid var(--border); border-radius: 12px; padding: 0.7rem 0.95rem; font-weight: 700; background: #f8fafc; color: var(--text); }
    .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
    .btn-secondary { background: #eef2f2; color: var(--text); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; box-shadow: var(--shadow); padding: 1rem; }
    .stats { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 0.85rem; }
    .stat { border: 1px solid var(--border); border-radius: 16px; padding: 0.9rem; background: linear-gradient(135deg, #fff, #f7f4ec); }
    .stat-label { font-size: 0.82rem; letter-spacing: 0.14em; text-transform: uppercase; color: #4c5a67; }
    .stat-value { font-size: 1.5rem; font-weight: 800; margin-top: 0.25rem; }
    .grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 0.85rem; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.8rem 0.65rem; border-bottom: 1px solid var(--border); text-align: left; font-size: 0.95rem; }
    th { color: #4c5a67; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.12em; }
    .status-pill { display: inline-flex; align-items: center; padding: 0.35rem 0.7rem; border-radius: 999px; font-size: 0.86rem; font-weight: 700; white-space: nowrap; }
    .status-healthy { background: #dcfce7; color: #166534; }
    .status-followup { background: #fef3c7; color: #92400e; }
    .status-observe { background: #fee2e2; color: #991b1b; }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0.8rem; }
    .field { display: flex; flex-direction: column; gap: 0.35rem; }
    .field label { font-size: 0.84rem; font-weight: 700; color: #4c5a67; }
    .field input, .field select, .field textarea { border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 0.8rem; background: #fcfbf8; color: var(--text); min-height: 46px; }
    .field textarea { min-height: 96px; resize: vertical; }
    .error { color: var(--danger); font-weight: 700; font-size: 0.9rem; }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.72); display: grid; place-items: center; z-index: 1000; padding: 1rem; }
    .modal { width: min(900px, 100%); max-height: 90vh; overflow: auto; background: white; border-radius: 22px; box-shadow: var(--shadow); }
    .modal-header { background: var(--accent-dark); color: white; padding: 1rem 1.1rem; display: flex; justify-content: space-between; align-items: center; gap: 0.8rem; }
    .modal-header h3 { margin: 0.2rem 0 0; font-size: 1.1rem; }
    .modal-body { padding: 1rem; }
    .lock-screen { min-height: 100vh; display: grid; place-items: center; padding: 1rem; background: linear-gradient(135deg, #0f172a, #164e63); color: white; }
    .lock-card { width: min(440px, 100%); background: rgba(255,255,255,0.97); color: var(--text); border-radius: 22px; box-shadow: var(--shadow); padding: 1.2rem; }
    .lock-card h2 { margin: 0.35rem 0 0.25rem; font-size: 1.35rem; }
    .lock-card p { margin: 0 0 0.9rem; color: #4c5a67; }
    .toast { position: fixed; right: 1rem; bottom: 1rem; background: #111827; color: white; padding: 0.9rem 1rem; border-radius: 12px; max-width: min(360px, calc(100vw - 2rem)); box-shadow: var(--shadow); z-index: 1100; }
    .empty { color: #4c5a67; font-style: italic; }
    .help-text { color: #4c5a67; font-size: 0.92rem; margin-top: 0.2rem; }
    .view-switch { display: inline-flex; gap: 0.35rem; flex-wrap: wrap; }
    .view-btn { min-height: 40px; border: 1px solid var(--border); border-radius: 999px; padding: 0.5rem 0.8rem; background: #f8fafc; color: var(--text); font-weight: 700; }
    .view-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    .grade-dropdown { position: relative; display: inline-block; }
    .grade-dropdown-menu { display: none; position: absolute; top: calc(100% + 0.35rem); right: 0; min-width: 180px; background: white; border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); z-index: 20; overflow: hidden; }
    .grade-dropdown:hover .grade-dropdown-menu, .grade-dropdown:focus-within .grade-dropdown-menu { display: block; }
    .grade-option { width: 100%; text-align: left; border: 0; background: white; padding: 0.7rem 0.8rem; font-weight: 600; color: var(--text); }
    .grade-option:hover, .grade-option.active { background: #f3f7f7; color: var(--accent-dark); }
    .group-card { border: 1px solid var(--border); border-radius: 16px; padding: 0.8rem; background: #fcfbf8; margin-top: 0.75rem; }
    .group-toggle { width: 100%; display: flex; justify-content: space-between; align-items: center; border: 0; background: transparent; padding: 0.2rem 0; font-weight: 800; color: var(--accent-dark); text-align: left; }
    .group-toggle span { font-size: 1rem; }
    .group-body { margin-top: 0.55rem; display: none; }
    .group-card.open .group-body { display: block; }
    .folder-icon { font-size: 1rem; margin-right: 0.45rem; }
    @media (max-width: 900px) { .shell { flex-direction: column; } .sidebar { width: 100%; } .stats, .grid, .form-grid { grid-template-columns: 1fr; } .main { padding: 0.85rem; } }
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div id="app"></div>
  <script>
    const storage = {
      get(key, fallback) {
        try {
          const sessionValue = sessionStorage.getItem(key);
          if (sessionValue !== null) return JSON.parse(sessionValue);
          const value = localStorage.getItem(key);
          return value === null ? fallback : JSON.parse(value);
        } catch { return fallback; }
      },
      set(key, value) {
        sessionStorage.setItem(key, JSON.stringify(value));
        localStorage.setItem(key, JSON.stringify(value));
      },
      remove(key) {
        sessionStorage.removeItem(key);
        localStorage.removeItem(key);
      }
    };


    const initialStudents = [
      { id: '2025-001', name: 'Maria Santos', grade: 'Grade 12', section: 'TVL-A', allergies: 'Penicillin', lastVisit: 'June 29, 2026', status: 'Healthy', parentName: 'Roberto Santos', emergencyContact: 'Roberto Santos (Father)', contactNumber: '+63 917 555 0192', dob: '2009-10-12', age: '16', family: 'Family 3', bloodType: 'O+', chronic: 'Asthma' },
      { id: '2025-014', name: 'Joana Cabasan', grade: 'Grade 12', section: 'TVL-B', allergies: 'Peanuts', lastVisit: 'June 28, 2026', status: 'Follow-up Required', parentName: 'Elena Cabasan', emergencyContact: 'Elena Cabasan (Mother)', contactNumber: '+63 918 555 0411', dob: '2011-04-05', age: '15', family: 'Family 5', bloodType: 'A-', chronic: 'None' },
      { id: '2025-023', name: 'Ana Cruz', grade: 'Grade 11', section: 'STEM', allergies: 'None', lastVisit: 'June 25, 2026', status: 'Under Observation', parentName: 'Teresa Cruz', emergencyContact: 'Teresa Cruz (Mother)', contactNumber: '+63 920 555 0834', dob: '2009-01-22', age: '17', family: 'Family 2', bloodType: 'B+', chronic: 'Allergic Rhinitis' }
    ];
    const initialConsultations = [
      { id: 'CON-9821', studentId: '2025-001', date: 'June 29, 2026', chiefComplaint: 'Headache', assessment: 'Mild dehydration', statusBadge: 'Healthy', nurse: 'Nurse Maria' },
      { id: 'CON-9820', studentId: '2025-014', date: 'June 28, 2026', chiefComplaint: 'Severe Migraine', assessment: 'Exam anxiety', statusBadge: 'Follow-up Required', nurse: 'Nurse Angela' }
    ];
    const initialFollowUps = [
      { id: 'FU-0101', studentId: '2025-001', reason: 'Blood Pressure Monitoring', scheduledDate: '2026-07-02', status: 'Upcoming' },
      { id: 'FU-0102', studentId: '2025-014', reason: 'Migraine Check', scheduledDate: '2026-07-01', status: 'Upcoming' }
    ];


    const hasStoredPin = Boolean(storage.get('mediCoreClinicPin', ''));
    const hasCompletedSetup = Boolean(storage.get('mediCorePinSetupComplete', false));
    const isFirstRun = !hasStoredPin && !hasCompletedSetup;


    const state = {
      activeTab: 'Dashboard',
      activeStudentId: null,
      students: storage.get('mediCoreStudents', initialStudents),
      consultations: storage.get('mediCoreConsultations', initialConsultations),
      followUps: storage.get('mediCoreFollowUps', initialFollowUps),
      searchQuery: '',
      isLocked: hasStoredPin && !isFirstRun,
      clinicPin: storage.get('mediCoreClinicPin', ''),
      pinInput: '', setupPin: '', confirmSetupPin: '', pinError: false, setupPinError: '',
      isPinModalOpen: isFirstRun, currentPinEntry: '', newPin: '', confirmPin: '', pinChangeError: '',
      isAddStudentModalOpen: false,
      isAddSectionModalOpen: false,
      isAddFamilyModalOpen: false,
      newSectionName: '',
      newFamilyName: '',
      toast: null,
      studentViewMode: 'All',
      studentGradeFilter: 'All Grades',
      openGroupName: null,
      newStudentForm: { id: '', name: '', grade: '', section: '', dob: '', age: '', family: '', bloodType: '', allergies: '', chronic: '', parentName: '', emergencyContact: '', contactNumber: '', status: 'Healthy' },
      formErrors: {}
    };


    function saveData() {
      storage.set('mediCoreStudents', state.students);
      storage.set('mediCoreConsultations', state.consultations);
      storage.set('mediCoreFollowUps', state.followUps);
      if (state.clinicPin) {
        storage.set('mediCoreClinicPin', state.clinicPin);
        storage.set('mediCorePinSetupComplete', true);
      } else {
        storage.remove('mediCoreClinicPin');
        storage.set('mediCorePinSetupComplete', false);
      }
    }
    function showToast(message) { state.toast = message; render(); window.setTimeout(() => { if (state.toast === message) { state.toast = null; render(); } }, 3000); }
    function escapeHtml(value) { return String(value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\"/g, '&quot;').replace(/'/g, '&#39;'); }
    function statusClass(status) { if (status === 'Healthy') return 'status-healthy'; if (status === 'Follow-up Required') return 'status-followup'; return 'status-observe'; }
    function resetStudentForm() { state.newStudentForm = { id: '', name: '', grade: '', section: '', dob: '', age: '', family: '', bloodType: '', allergies: '', chronic: '', parentName: '', emergencyContact: '', contactNumber: '', status: 'Healthy' }; state.formErrors = {}; }


    function render() {
      const app = document.getElementById('app');
      if (state.isLocked) {
        const isFirstRunSetup = !state.clinicPin;
        app.innerHTML = `
          <div class="lock-screen">
            <div class="lock-card">
              <div class="brand" style="border-bottom:0; padding:0 0 0.6rem; justify-content:center;">
                <div class="brand-badge">✚</div>
                <div>
                  <h1 style="margin:0;">MediCore AI</h1>
                  <p>Clinic Desk OS</p>
                </div>
              </div>
              <h2>${isFirstRunSetup ? 'Welcome! Create Your PIN' : 'Clinic Terminal Protected'}</h2>
              <p>${isFirstRunSetup ? 'This is your first-time setup. Create a 4-8 digit PIN to continue and access the clinic system.' : 'Enter your PIN to continue with the clinic system.'}</p>
              ${isFirstRunSetup ? `
                <form id="setupForm">
                  <div class="field">
                    <label for="setupPin">Create PIN</label>
                    <input id="setupPin" name="setupPin" type="password" inputmode="numeric" maxlength="8" autocomplete="new-password" value="${escapeHtml(state.setupPin)}" />
                  </div>
                  <div class="field" style="margin-top:0.65rem;">
                    <label for="confirmSetupPin">Confirm PIN</label>
                    <input id="confirmSetupPin" name="confirmSetupPin" type="password" inputmode="numeric" maxlength="8" autocomplete="new-password" value="${escapeHtml(state.confirmSetupPin)}" />
                  </div>
                  ${state.setupPinError ? '<div class="error" role="alert" style="margin-top:0.6rem;">' + escapeHtml(state.setupPinError) + '</div>' : ''}
                  <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.8rem;">Create PIN and Continue</button>
                </form>
              ` : `
                <form id="unlockForm">
                  <div class="field">
                    <label for="pinInput">PIN</label>
                    <input id="pinInput" name="pinInput" type="password" inputmode="numeric" maxlength="8" autocomplete="current-password" value="${escapeHtml(state.pinInput)}" />
                  </div>
                  ${state.pinError ? '<div class="error" role="alert">Incorrect PIN. Please try again.</div>' : ''}
                  <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.8rem;">Unlock Clinic Terminal</button>
                </form>
              `}
            </div>
          </div>
        `;
        attachLockEvents();
        return;
      }


      const stats = { totalRecords: state.students.length, pendingFollowups: state.followUps.length, todayConsultations: state.consultations.filter(c => c.date === 'June 29, 2026').length };
      const activeStudent = state.students.find(student => student.id === state.activeStudentId) || null;
      const filteredStudents = state.students.filter(student => {
        const query = state.searchQuery.toLowerCase().trim();
        const matchesQuery = !query || [student.name, student.id, student.grade, student.section, student.family].some(value => String(value).toLowerCase().includes(query));
        const matchesGrade = state.studentGradeFilter === 'All Grades' || student.grade === state.studentGradeFilter;
        return matchesQuery && matchesGrade;
      }).sort((a, b) => {
        const sectionCompare = a.section.localeCompare(b.section);
        if (sectionCompare !== 0) return sectionCompare;
        const familyCompare = a.family.localeCompare(b.family);
        if (familyCompare !== 0) return familyCompare;
        return a.name.localeCompare(b.name);
      });
      const groupedBySection = Array.from(new Map(filteredStudents.reduce((groups, student) => {
        const key = student.section;
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(student);
        return groups;
      }, new Map())).entries()).map(([groupName, items]) => ({ groupName, items: items.sort((a, b) => a.name.localeCompare(b.name)) })).sort((a, b) => a.groupName.localeCompare(b.groupName));
      const groupedByFamily = Array.from(new Map(filteredStudents.reduce((groups, student) => {
        const key = student.family;
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(student);
        return groups;
      }, new Map())).entries()).map(([groupName, items]) => ({ groupName, items: items.sort((a, b) => a.name.localeCompare(b.name)) })).sort((a, b) => a.groupName.localeCompare(b.groupName));


      app.innerHTML = `
        <div class="app">
          <div class="shell">
            <aside class="sidebar" aria-label="Primary">
              <div class="brand">
                <div class="brand-badge">✚</div>
                <div><h1>MediCore AI</h1><p>Clinic Desk OS</p></div>
              </div>
              <nav class="nav" aria-label="Main navigation">
                <button type="button" class="${state.activeTab === 'Dashboard' ? 'active' : ''}" data-tab="Dashboard">🏠 Dashboard</button>
                <button type="button" class="${state.activeTab === 'Student Records' ? 'active' : ''}" data-tab="Student Records">👩 Student Records</button>
                <button type="button" class="${state.activeTab === 'Follow-ups' ? 'active' : ''}" data-tab="Follow-ups">🗓️ Follow-ups</button>
              </nav>
              <div class="sidebar-note">
                <strong>Accessible offline mode</strong>
                <p style="margin:0.35rem 0 0;">Large controls, strong contrast, and keyboard-friendly navigation are built in.</p>
              </div>
            </aside>
            <main id="main-content" class="main" tabindex="-1">
              <div class="topbar">
                <div><h2>${escapeHtml(state.activeTab)}</h2><p>Secure clinic workspace • Accessible for all users</p></div>
                <div class="topbar-actions">
                  <button type="button" class="btn btn-secondary" id="changePinBtn">🔐 Change PIN</button>
                  <button type="button" class="btn btn-secondary" id="lockBtn">🔒 Lock</button>
                </div>
              </div>


              ${state.activeTab === 'Dashboard' ? `
                <div class="stats">
                  <div class="stat"><div class="stat-label">Total Records</div><div class="stat-value">${stats.totalRecords}</div></div>
                  <div class="stat"><div class="stat-label">Pending Follow-ups</div><div class="stat-value">${stats.pendingFollowups}</div></div>
                  <div class="stat"><div class="stat-label">Today Consultations</div><div class="stat-value">${stats.todayConsultations}</div></div>
                </div>
                <div class="grid">
                  <section class="card" aria-labelledby="overview-title">
                    <h3 id="overview-title" style="margin-top:0;">Quick overview</h3>
                    <p class="help-text">This workspace is designed to run fully offline and stays easy to use with a keyboard or screen reader.</p>
                    <div class="form-grid" style="margin-top:0.85rem;">
                      <div class="card" style="padding:0.85rem;"><strong>Upcoming follow-ups</strong><ul>${state.followUps.slice(0,3).map(item => `<li>${escapeHtml(item.reason)} • ${escapeHtml(item.scheduledDate)}</li>`).join('')}</ul></div>
                      <div class="card" style="padding:0.85rem;"><strong>Recent consultations</strong><ul>${state.consultations.slice(0,3).map(item => `<li>${escapeHtml(item.studentId)} • ${escapeHtml(item.chiefComplaint)}</li>`).join('')}</ul></div>
                    </div>
                  </section>
                  <section class="card" aria-labelledby="actions-title">
                    <h3 id="actions-title" style="margin-top:0;">Actions</h3>
                    <div style="display:flex; flex-direction:column; gap:0.6rem;">
                      <button type="button" class="btn btn-primary" data-tab="Student Records">Open Student Records</button>
                      <button type="button" class="btn btn-secondary" data-tab="Follow-ups">Review Follow-ups</button>
                    </div>
                  </section>
                </div>
              ` : ''}


              ${state.activeTab === 'Student Records' ? `
                <section class="card" aria-labelledby="students-title">
                  <div style="display:flex; justify-content:space-between; align-items:center; gap:0.8rem; flex-wrap:wrap; margin-bottom:0.7rem;">
                    <div>
                      <h3 id="students-title" style="margin:0;">Student Records</h3>
                      <p class="help-text">Search by name, ID, grade, or section.</p>
                    </div>
                    <div style="display:flex; gap:0.65rem; flex-wrap:wrap; align-items:center;">
                      <label class="sr-only" for="studentSearch">Search students</label>
                      <input id="studentSearch" type="search" value="${escapeHtml(state.searchQuery)}" placeholder="Search students" style="min-width:250px;" />
                      <div class="view-switch" role="group" aria-label="Student record view">
                        <button type="button" class="view-btn ${state.studentViewMode === 'All' ? 'active' : ''}" data-view-mode="All">All</button>
                        <button type="button" class="view-btn ${state.studentViewMode === 'By Section' ? 'active' : ''}" data-view-mode="By Section">By Section</button>
                        <button type="button" class="view-btn ${state.studentViewMode === 'By Family' ? 'active' : ''}" data-view-mode="By Family">By Family</button>
                      </div>
                      <div class="grade-dropdown">
                        <button type="button" class="btn btn-secondary">Year Level ▾</button>
                        <div class="grade-dropdown-menu">
                          <button type="button" class="grade-option ${state.studentGradeFilter === 'All Grades' ? 'active' : ''}" data-grade-filter="All Grades">All Grades</button>
                          <button type="button" class="grade-option ${state.studentGradeFilter === 'Grade 7' ? 'active' : ''}" data-grade-filter="Grade 7">Grade 7</button>
                          <button type="button" class="grade-option ${state.studentGradeFilter === 'Grade 8' ? 'active' : ''}" data-grade-filter="Grade 8">Grade 8</button>
                          <button type="button" class="grade-option ${state.studentGradeFilter === 'Grade 9' ? 'active' : ''}" data-grade-filter="Grade 9">Grade 9</button>
                          <button type="button" class="grade-option ${state.studentGradeFilter === 'Grade 10' ? 'active' : ''}" data-grade-filter="Grade 10">Grade 10</button>
                          <button type="button" class="grade-option ${state.studentGradeFilter === 'Grade 11' ? 'active' : ''}" data-grade-filter="Grade 11">Grade 11</button>
                          <button type="button" class="grade-option ${state.studentGradeFilter === 'Grade 12' ? 'active' : ''}" data-grade-filter="Grade 12">Grade 12</button>
                        </div>
                      </div>
                      ${state.studentViewMode === 'By Section' ? '<button type="button" class="btn btn-secondary" id="addSectionBtn">+ Add Section</button>' : ''}
                      ${state.studentViewMode === 'By Family' ? '<button type="button" class="btn btn-secondary" id="addFamilyBtn">+ Add Family</button>' : ''}
                      <button type="button" class="btn btn-primary" id="addStudentBtn">+ Add Student</button>
                    </div>
                  </div>
                  ${activeStudent ? `
                    <div class="card" style="padding:0.95rem; margin-top:0.85rem;">
                      <div style="display:flex; justify-content:space-between; align-items:center; gap:0.7rem; flex-wrap:wrap;">
                        <div>
                          <h4 style="margin:0;">${escapeHtml(activeStudent.name)}</h4>
                          <p class="help-text" style="margin:0.2rem 0 0;">${escapeHtml(activeStudent.id)} • ${escapeHtml(activeStudent.grade)} • ${escapeHtml(activeStudent.section)}</p>
                        </div>
                        <button type="button" class="btn btn-secondary" id="backToRosterBtn">← Back to roster</button>
                      </div>
                      <div class="form-grid" style="margin-top:0.85rem;">
                        <div class="field"><label>Parent / Guardian</label><input value="${escapeHtml(activeStudent.parentName)}" readonly /></div>
                        <div class="field"><label>Emergency Contact</label><input value="${escapeHtml(activeStudent.emergencyContact)}" readonly /></div>
                        <div class="field"><label>Contact Number</label><input value="${escapeHtml(activeStudent.contactNumber)}" readonly /></div>
                        <div class="field"><label>Allergies</label><input value="${escapeHtml(activeStudent.allergies)}" readonly /></div>
                      </div>
                    </div>
                  ` : `
                    ${!filteredStudents.length ? '<div class="empty">No records match your search.</div>' : ''}
                    ${state.studentViewMode === 'All' ? `
                      <div class="table-wrap"><table><caption class="sr-only">Student records table</caption><thead><tr><th scope="col">Student ID</th><th scope="col">Name</th><th scope="col">Grade & Section</th><th scope="col">Family</th><th scope="col">Allergies</th><th scope="col">Last Visit</th><th scope="col">Status</th><th scope="col">Action</th></tr></thead><tbody>${filteredStudents.map(student => `
                        <tr>
                          <td>${escapeHtml(student.id)}</td>
                          <td>${escapeHtml(student.name)}</td>
                          <td>${escapeHtml(student.grade)} • ${escapeHtml(student.section)}</td>
                          <td>${escapeHtml(student.family)}</td>
                          <td>${escapeHtml(student.allergies)}</td>
                          <td>${escapeHtml(student.lastVisit)}</td>
                          <td><span class="status-pill ${statusClass(student.status)}">${escapeHtml(student.status)}</span></td>
                          <td><button type="button" class="btn btn-primary" data-open-student="${escapeHtml(student.id)}">View</button></td>
                        </tr>
                      `).join('')}</tbody></table></div>
                    ` : ''}
                    ${state.studentViewMode === 'By Section' ? groupedBySection.map(group => `
                      <div class="group-card ${state.openGroupName === group.groupName ? 'open' : ''}">
                        <button type="button" class="group-toggle" data-group-toggle="${escapeHtml(group.groupName)}">
                          <span><span class="folder-icon">📁</span>${escapeHtml(group.groupName)}</span>
                          <span>${state.openGroupName === group.groupName ? '▾' : '▸'}</span>
                        </button>
                        <div class="group-body">
                          <div class="table-wrap"><table><caption class="sr-only">Students in ${escapeHtml(group.groupName)}</caption><thead><tr><th scope="col">Student ID</th><th scope="col">Name</th><th scope="col">Grade</th><th scope="col">Family</th><th scope="col">Status</th><th scope="col">Action</th></tr></thead><tbody>${group.items.map(student => `
                            <tr>
                              <td>${escapeHtml(student.id)}</td>
                              <td>${escapeHtml(student.name)}</td>
                              <td>${escapeHtml(student.grade)}</td>
                              <td>${escapeHtml(student.family)}</td>
                              <td><span class="status-pill ${statusClass(student.status)}">${escapeHtml(student.status)}</span></td>
                              <td><button type="button" class="btn btn-primary" data-open-student="${escapeHtml(student.id)}">View</button></td>
                            </tr>
                          `).join('')}</tbody></table></div>
                        </div>
                      </div>
                    `).join('') : ''}
                    ${state.studentViewMode === 'By Family' ? groupedByFamily.map(group => `
                      <div class="group-card ${state.openGroupName === group.groupName ? 'open' : ''}">
                        <button type="button" class="group-toggle" data-group-toggle="${escapeHtml(group.groupName)}">
                          <span><span class="folder-icon">📁</span>${escapeHtml(group.groupName)}</span>
                          <span>${state.openGroupName === group.groupName ? '▾' : '▸'}</span>
                        </button>
                        <div class="group-body">
                          <div class="table-wrap"><table><caption class="sr-only">Students in ${escapeHtml(group.groupName)}</caption><thead><tr><th scope="col">Student ID</th><th scope="col">Name</th><th scope="col">Grade</th><th scope="col">Section</th><th scope="col">Status</th><th scope="col">Action</th></tr></thead><tbody>${group.items.map(student => `
                            <tr>
                              <td>${escapeHtml(student.id)}</td>
                              <td>${escapeHtml(student.name)}</td>
                              <td>${escapeHtml(student.grade)}</td>
                              <td>${escapeHtml(student.section)}</td>
                              <td><span class="status-pill ${statusClass(student.status)}">${escapeHtml(student.status)}</span></td>
                              <td><button type="button" class="btn btn-primary" data-open-student="${escapeHtml(student.id)}">View</button></td>
                            </tr>
                          `).join('')}</tbody></table></div>
                        </div>
                      </div>
                    `).join('') : ''}
                  `}
                </section>
              ` : ''}


              ${state.activeTab === 'Follow-ups' ? `
                <section class="card" aria-labelledby="followups-title">
                  <h3 id="followups-title" style="margin-top:0;">Follow-ups</h3>
                  <div class="table-wrap"><table><caption class="sr-only">Follow-ups table</caption><thead><tr><th scope="col">ID</th><th scope="col">Student</th><th scope="col">Reason</th><th scope="col">Scheduled Date</th><th scope="col">Status</th></tr></thead><tbody>${state.followUps.map(item => `
                    <tr>
                      <td>${escapeHtml(item.id)}</td>
                      <td>${escapeHtml(item.studentId)}</td>
                      <td>${escapeHtml(item.reason)}</td>
                      <td>${escapeHtml(item.scheduledDate)}</td>
                      <td><span class="status-pill ${statusClass(item.status === 'Upcoming' ? 'Follow-up Required' : item.status)}">${escapeHtml(item.status)}</span></td>
                    </tr>
                  `).join('')}</tbody></table></div>
                </section>
              ` : ''}
            </main>
          </div>
        </div>


        ${state.isPinModalOpen ? `
          <div class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="pin-modal-title">
            <div class="modal">
              <div class="modal-header">
                <div><div style="font-size:0.72rem; letter-spacing:0.15em; text-transform:uppercase; color:#b7f0e4;">PIN Management</div><h3 id="pin-modal-title">${state.clinicPin ? 'Set / Reset Access PIN' : 'Create Your Access PIN'}</h3></div>
                <button type="button" class="btn btn-secondary" id="closePinModalBtn">✕</button>
              </div>
              <div class="modal-body">
                <p class="help-text">${state.clinicPin ? 'Enter your current PIN and choose a new 4-8 digit PIN.' : 'Create a 4-8 digit PIN to secure the clinic terminal for first-time use.'}</p>
                <div class="form-grid">
                  ${state.clinicPin ? '<div class="field"><label for="currentPinEntry">Current PIN</label><input id="currentPinEntry" type="password" inputmode="numeric" maxlength="8" value="' + escapeHtml(state.currentPinEntry) + '" /></div>' : ''}
                  <div class="field"><label for="newPin">New PIN</label><input id="newPin" type="password" inputmode="numeric" maxlength="8" value="${escapeHtml(state.newPin)}" /></div>
                  <div class="field"><label for="confirmPin">Confirm PIN</label><input id="confirmPin" type="password" inputmode="numeric" maxlength="8" value="${escapeHtml(state.confirmPin)}" /></div>
                </div>
                ${state.pinChangeError ? '<div class="error" role="alert" style="margin-top:0.75rem;">' + escapeHtml(state.pinChangeError) + '</div>' : ''}
                <div style="display:flex; justify-content:flex-end; gap:0.7rem; margin-top:0.95rem;"><button type="button" class="btn btn-secondary" id="cancelPinModalBtn">Cancel</button><button type="button" class="btn btn-primary" id="savePinBtn">${state.clinicPin ? 'Save PIN' : 'Create PIN'}</button></div>
              </div>
            </div>
          </div>
        ` : ''}


        ${state.isAddSectionModalOpen ? `
          <div class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="section-modal-title">
            <div class="modal">
              <div class="modal-header">
                <div><div style="font-size:0.72rem; letter-spacing:0.15em; text-transform:uppercase; color:#b7f0e4;">Section Setup</div><h3 id="section-modal-title">Add Section</h3></div>
                <button type="button" class="btn btn-secondary" id="closeAddSectionBtn">✕</button>
              </div>
              <div class="modal-body">
                <div class="field">
                  <label for="newSectionName">Section Name</label>
                  <input id="newSectionName" value="${escapeHtml(state.newSectionName)}" />
                </div>
                <div style="display:flex; justify-content:flex-end; gap:0.7rem; margin-top:1rem;"><button type="button" class="btn btn-secondary" id="cancelAddSectionBtn">Cancel</button><button type="button" class="btn btn-primary" id="saveSectionBtn">Add Section</button></div>
              </div>
            </div>
          </div>
        ` : ''}


        ${state.isAddFamilyModalOpen ? `
          <div class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="family-modal-title">
            <div class="modal">
              <div class="modal-header">
                <div><div style="font-size:0.72rem; letter-spacing:0.15em; text-transform:uppercase; color:#b7f0e4;">Family Setup</div><h3 id="family-modal-title">Add Family</h3></div>
                <button type="button" class="btn btn-secondary" id="closeAddFamilyBtn">✕</button>
              </div>
              <div class="modal-body">
                <div class="field">
                  <label for="newFamilyName">Family Name</label>
                  <input id="newFamilyName" value="${escapeHtml(state.newFamilyName)}" />
                </div>
                <div style="display:flex; justify-content:flex-end; gap:0.7rem; margin-top:1rem;"><button type="button" class="btn btn-secondary" id="cancelAddFamilyBtn">Cancel</button><button type="button" class="btn btn-primary" id="saveFamilyBtn">Add Family</button></div>
              </div>
            </div>
          </div>
        ` : ''}


        ${state.isAddStudentModalOpen ? `
          <div class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="student-modal-title">
            <div class="modal">
              <div class="modal-header">
                <div><div style="font-size:0.72rem; letter-spacing:0.15em; text-transform:uppercase; color:#b7f0e4;">Student Enrollment</div><h3 id="student-modal-title">Add Student Medical Record</h3></div>
                <button type="button" class="btn btn-secondary" id="closeAddStudentBtn">✕</button>
              </div>
              <div class="modal-body">
                <div class="form-grid">
                  <div class="field"><label for="studentId">Student ID</label><input id="studentId" value="${escapeHtml(state.newStudentForm.id)}" /></div>
                  <div class="field"><label for="studentName">Full Name</label><input id="studentName" value="${escapeHtml(state.newStudentForm.name)}" /></div>
                  <div class="field"><label for="studentGrade">Grade Level</label><input id="studentGrade" value="${escapeHtml(state.newStudentForm.grade)}" /></div>
                  <div class="field"><label for="studentSection">Section</label><input id="studentSection" value="${escapeHtml(state.newStudentForm.section)}" /></div>
                  <div class="field"><label for="studentDob">Date of Birth</label><input id="studentDob" type="date" value="${escapeHtml(state.newStudentForm.dob)}" /></div>
                  <div class="field"><label for="studentAge">Age</label><input id="studentAge" type="number" value="${escapeHtml(state.newStudentForm.age)}" /></div>
                  <div class="field"><label for="studentFamily">Family</label><input id="studentFamily" value="${escapeHtml(state.newStudentForm.family)}" /></div>
                  <div class="field"><label for="studentBloodType">Blood Type</label><input id="studentBloodType" value="${escapeHtml(state.newStudentForm.bloodType)}" /></div>
                  <div class="field"><label for="studentAllergies">Allergies</label><input id="studentAllergies" value="${escapeHtml(state.newStudentForm.allergies)}" /></div>
                  <div class="field"><label for="studentChronic">Chronic Conditions</label><input id="studentChronic" value="${escapeHtml(state.newStudentForm.chronic)}" /></div>
                  <div class="field"><label for="studentParent">Parent / Guardian</label><input id="studentParent" value="${escapeHtml(state.newStudentForm.parentName)}" /></div>
                  <div class="field"><label for="studentEmergency">Emergency Contact</label><input id="studentEmergency" value="${escapeHtml(state.newStudentForm.emergencyContact)}" /></div>
                  <div class="field"><label for="studentContact">Contact Number</label><input id="studentContact" value="${escapeHtml(state.newStudentForm.contactNumber)}" /></div>
                  <div class="field"><label for="studentStatus">Status</label><select id="studentStatus"><option value="Healthy" ${state.newStudentForm.status === 'Healthy' ? 'selected' : ''}>Healthy</option><option value="Follow-up Required" ${state.newStudentForm.status === 'Follow-up Required' ? 'selected' : ''}>Follow-up Required</option><option value="Under Observation" ${state.newStudentForm.status === 'Under Observation' ? 'selected' : ''}>Under Observation</option></select></div>
                </div>
                ${Object.keys(state.formErrors).length ? '<div class="error" role="alert" style="margin-top:0.75rem;">' + Object.values(state.formErrors).join(' ') + '</div>' : ''}
                <div style="display:flex; justify-content:flex-end; gap:0.7rem; margin-top:1rem;"><button type="button" class="btn btn-secondary" id="cancelAddStudentBtn">Cancel</button><button type="button" class="btn btn-primary" id="saveStudentBtn">Add Student</button></div>
              </div>
            </div>
          </div>
        ` : ''}


        ${state.toast ? `<div class="toast" role="status" aria-live="polite">${escapeHtml(state.toast)}</div>` : ''}
      `;
      attachEvents();
    }


    function attachLockEvents() {
      document.getElementById('unlockForm')?.addEventListener('submit', event => {
        event.preventDefault();
        if (state.pinInput === state.clinicPin) { state.isLocked = false; state.pinError = false; state.pinInput = ''; render(); } else { state.pinError = true; state.pinInput = ''; render(); }
      });
      document.getElementById('setupForm')?.addEventListener('submit', event => {
        event.preventDefault();
        const pin = document.getElementById('setupPin').value.replace(/\D/g, '');
        const confirm = document.getElementById('confirmSetupPin').value.replace(/\D/g, '');
        if (!/^\d{4,8}$/.test(pin)) { state.setupPinError = 'PIN must be 4-8 digits.'; render(); return; }
        if (pin !== confirm) { state.setupPinError = 'PIN confirmation does not match.'; render(); return; }
        state.clinicPin = pin; state.setupPin = ''; state.confirmSetupPin = ''; state.setupPinError = ''; state.isLocked = false; saveData(); render();
      });
      document.getElementById('pinInput')?.addEventListener('input', event => { state.pinInput = event.target.value.replace(/\D/g, ''); state.pinError = false; });
      document.getElementById('setupPin')?.addEventListener('input', event => { state.setupPin = event.target.value.replace(/\D/g, ''); state.setupPinError = ''; });
      document.getElementById('confirmSetupPin')?.addEventListener('input', event => { state.confirmSetupPin = event.target.value.replace(/\D/g, ''); state.setupPinError = ''; });
    }


    function attachEvents() {
      document.querySelectorAll('[data-tab]').forEach(button => button.addEventListener('click', () => { const tab = button.getAttribute('data-tab'); if (tab) { state.activeTab = tab; if (tab !== 'Student Records') state.activeStudentId = null; render(); } }));
      document.getElementById('lockBtn')?.addEventListener('click', () => { state.isLocked = true; state.pinInput = ''; state.pinError = false; render(); });
      document.getElementById('changePinBtn')?.addEventListener('click', () => { state.isPinModalOpen = true; state.currentPinEntry = ''; state.newPin = ''; state.confirmPin = ''; state.pinChangeError = ''; render(); });
      document.getElementById('closePinModalBtn')?.addEventListener('click', () => { state.isPinModalOpen = false; render(); });
      document.getElementById('cancelPinModalBtn')?.addEventListener('click', () => { state.isPinModalOpen = false; render(); });
      document.getElementById('savePinBtn')?.addEventListener('click', () => {
        const currentInput = document.getElementById('currentPinEntry');
        const current = currentInput?.value.replace(/\D/g, '') || '';
        const newPin = document.getElementById('newPin').value.replace(/\D/g, '');
        const confirm = document.getElementById('confirmPin').value.replace(/\D/g, '');
        if (state.clinicPin && current !== state.clinicPin) { state.pinChangeError = 'Current PIN is incorrect.'; render(); return; }
        if (!/^\d{4,8}$/.test(newPin)) { state.pinChangeError = 'New PIN must be 4-8 digits.'; render(); return; }
        if (newPin !== confirm) { state.pinChangeError = 'PIN confirmation does not match.'; render(); return; }
        state.clinicPin = newPin; state.isPinModalOpen = false; state.pinChangeError = ''; state.currentPinEntry = ''; state.newPin = ''; state.confirmPin = ''; saveData(); showToast('PIN updated successfully.'); render();
      });
      document.getElementById('addSectionBtn')?.addEventListener('click', () => { state.isAddSectionModalOpen = true; state.newSectionName = ''; render(); });
      document.getElementById('closeAddSectionBtn')?.addEventListener('click', () => { state.isAddSectionModalOpen = false; render(); });
      document.getElementById('cancelAddSectionBtn')?.addEventListener('click', () => { state.isAddSectionModalOpen = false; render(); });
      document.getElementById('saveSectionBtn')?.addEventListener('click', () => {
        const sectionName = document.getElementById('newSectionName').value.trim();
        if (!sectionName) { showToast('Section name is required.'); return; }
        state.students.forEach(student => {
          if (!student.section) student.section = sectionName;
        });
        state.isAddSectionModalOpen = false; state.newSectionName = ''; saveData(); showToast('Section added successfully.');
      });
      document.getElementById('addFamilyBtn')?.addEventListener('click', () => { state.isAddFamilyModalOpen = true; state.newFamilyName = ''; render(); });
      document.getElementById('closeAddFamilyBtn')?.addEventListener('click', () => { state.isAddFamilyModalOpen = false; render(); });
      document.getElementById('cancelAddFamilyBtn')?.addEventListener('click', () => { state.isAddFamilyModalOpen = false; render(); });
      document.getElementById('saveFamilyBtn')?.addEventListener('click', () => {
        const familyName = document.getElementById('newFamilyName').value.trim();
        if (!familyName) { showToast('Family name is required.'); return; }
        state.students.forEach(student => {
          if (!student.family) student.family = familyName;
        });
        state.isAddFamilyModalOpen = false; state.newFamilyName = ''; saveData(); showToast('Family added successfully.');
      });
      document.getElementById('addStudentBtn')?.addEventListener('click', () => { state.isAddStudentModalOpen = true; resetStudentForm(); render(); });
      document.getElementById('closeAddStudentBtn')?.addEventListener('click', () => { state.isAddStudentModalOpen = false; render(); });
      document.getElementById('cancelAddStudentBtn')?.addEventListener('click', () => { state.isAddStudentModalOpen = false; render(); });
      document.getElementById('saveStudentBtn')?.addEventListener('click', () => {
        const errors = {};
        if (!document.getElementById('studentId').value.trim()) errors.id = 'Student ID is required.';
        if (!document.getElementById('studentName').value.trim()) errors.name = 'Full name is required.';
        if (!document.getElementById('studentGrade').value.trim()) errors.grade = 'Grade level is required.';
        if (!document.getElementById('studentSection').value.trim()) errors.section = 'Section is required.';
        if (Object.keys(errors).length) { state.formErrors = errors; render(); return; }
        state.students.unshift({ id: document.getElementById('studentId').value.trim(), name: document.getElementById('studentName').value.trim(), grade: document.getElementById('studentGrade').value.trim(), section: document.getElementById('studentSection').value.trim(), allergies: document.getElementById('studentAllergies').value.trim() || 'None', lastVisit: 'Today', status: document.getElementById('studentStatus').value, parentName: document.getElementById('studentParent').value.trim(), emergencyContact: document.getElementById('studentEmergency').value.trim() || document.getElementById('studentParent').value.trim(), contactNumber: document.getElementById('studentContact').value.trim(), dob: document.getElementById('studentDob').value, age: document.getElementById('studentAge').value, family: document.getElementById('studentFamily').value.trim(), bloodType: document.getElementById('studentBloodType').value.trim(), chronic: document.getElementById('studentChronic').value.trim() });
        state.isAddStudentModalOpen = false; state.formErrors = {}; saveData(); showToast('Student record added successfully.');
      });
      document.getElementById('studentSearch')?.addEventListener('input', event => { state.searchQuery = event.target.value; render(); });
      document.querySelectorAll('[data-view-mode]').forEach(button => button.addEventListener('click', () => { state.studentViewMode = button.getAttribute('data-view-mode'); render(); }));
      document.querySelectorAll('[data-grade-filter]').forEach(button => button.addEventListener('click', () => { state.studentGradeFilter = button.getAttribute('data-grade-filter'); render(); }));
      document.querySelectorAll('[data-group-toggle]').forEach(button => button.addEventListener('click', () => { const groupName = button.getAttribute('data-group-toggle'); state.openGroupName = state.openGroupName === groupName ? null : groupName; render(); }));
      document.querySelectorAll('[data-open-student]').forEach(button => button.addEventListener('click', () => { state.activeStudentId = button.getAttribute('data-open-student'); render(); }));
      document.getElementById('backToRosterBtn')?.addEventListener('click', () => { state.activeStudentId = null; render(); });
      document.querySelectorAll('input, select').forEach(input => {
        if (input.id && input.id.startsWith('student') && input.id !== 'studentSearch') {
          input.addEventListener('input', () => {
            const key = input.id.replace('student', '');
            const normalized = key.charAt(0).toLowerCase() + key.slice(1);
            if (normalized === 'status') state.newStudentForm.status = input.value; else state.newStudentForm[normalized] = input.value;
          });
        }
      });
      document.addEventListener('keydown', event => { if (event.key === 'Escape') { if (state.isPinModalOpen) { state.isPinModalOpen = false; render(); } if (state.isAddStudentModalOpen) { state.isAddStudentModalOpen = false; render(); } if (state.isAddSectionModalOpen) { state.isAddSectionModalOpen = false; render(); } if (state.isAddFamilyModalOpen) { state.isAddFamilyModalOpen = false; render(); } } });
    }


    render();
  </script>
</body>
</html>
